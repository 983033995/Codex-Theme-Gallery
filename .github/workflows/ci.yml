name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: gallery-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
